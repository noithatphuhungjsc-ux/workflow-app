<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>WorkFlow</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6a7fd4" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WorkFlow" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>

    <!-- Recovery: if React doesn't render in 4s, nuke SW cache and reload -->
    <script>
      (function() {
        var RK = 'wf_recovered_v153';
        // Step 1: Always proactively clear old caches on load
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) {
              if (k.indexOf('v153') === -1) caches.delete(k);
            });
          });
        }
        // Step 2: If already recovered this session, skip timeout check
        if (sessionStorage.getItem(RK)) return;
        // Step 3: Set a 4s watchdog — if React mounts, it cancels this
        window.__wfRecoveryTimer = setTimeout(function() {
          // React didn't mount → app is stuck/crashed
          if (document.getElementById('root') && document.getElementById('root').childNodes.length > 0) return;
          console.warn('[WF] App failed to load, clearing all caches...');
          sessionStorage.setItem(RK, '1');
          var tasks = [];
          if ('serviceWorker' in navigator) {
            tasks.push(
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                return Promise.all(regs.map(function(r) { return r.unregister(); }));
              })
            );
          }
          if ('caches' in window) {
            tasks.push(
              caches.keys().then(function(keys) {
                return Promise.all(keys.map(function(k) { return caches.delete(k); }));
              })
            );
          }
          Promise.all(tasks).then(function() { location.reload(); }).catch(function() { location.reload(); });
        }, 4000);
      })();
    </script>

    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        // Force update: unregister old SW, clear caches, then register new one
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.update());
        });
        caches.keys().then(keys => keys.forEach(k => {
          if (!k.includes('v153')) caches.delete(k);
        }));
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
