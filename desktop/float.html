<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { background: transparent; overflow: hidden; user-select: none; }
  .btn {
    width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer;
    background: linear-gradient(135deg, #6a7fd4, #9b6fcf);
    box-shadow: 0 4px 20px rgba(106,127,212,.45);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; color: #fff; transition: all .2s;
    -webkit-app-region: drag;
  }
  .btn:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(106,127,212,.6); }
  .btn:active { transform: scale(.95); -webkit-app-region: no-drag; }
  .badge {
    position: absolute; top: -4px; right: -4px;
    width: 20px; height: 20px; border-radius: 50%;
    background: #e74c3c; color: #fff; font-size: 11px; font-weight: 800;
    display: none; align-items: center; justify-content: center;
    border: 2px solid #fff; font-family: system-ui;
  }
  .wrap { position: relative; width: 56px; height: 56px; }
</style>
</head>
<body>
  <div class="wrap">
    <button class="btn" id="fab" onclick="window.desktop?.floatClick()">&#x1F4CB;</button>
    <div class="badge" id="badge">0</div>
  </div>
</body>
</html>
